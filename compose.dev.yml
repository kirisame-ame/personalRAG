services:
  chromadb:
    profiles:
      - dev
    image: chromadb/chroma:1.0.15
    restart: unless-stopped
    volumes:
      - chroma-data:/data
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    profiles:
      - dev
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    profiles:
      - dev
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: personalrag
      POSTGRES_USER: personalrag
      POSTGRES_PASSWORD: personalrag
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personalrag -d personalrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    profiles:
      - dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command:
      ["fastapi", "dev", "main.py", "--port", "5200", "--host", "0.0.0.0"]
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true
      - RATELIMIT_STORAGE_URI=redis://redis:6379/0
      - QUERY_RATE_LIMIT=5/minute
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_SSL=false
      - POSTGRES_URI=postgresql://personalrag:personalrag@postgres:5432/personalrag
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - ADMIN_SESSION_SECRET=local-development-secret-change-me
      - ADMIN_COOKIE_SECURE=false

  frontend:
    profiles:
      - dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  chroma-data:
  frontend-node-modules:
  postgres-data:
