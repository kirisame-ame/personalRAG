services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command:
      [
        "/app/.venv/bin/fastapi",
        "dev",
        "main.py",
        "--port",
        "5200",
        "--host",
        "0.0.0.0",
      ]
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv
    environment:
      - WATCHFILES_FORCE_POLLING=true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  backend-venv:
  frontend-node-modules:
