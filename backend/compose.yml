services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      ["fastapi", "run", "main.py", "--host", "0.0.0.0", "--port", "5200"]
    ports:
      - "5200:5200"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
      QUERY_RATE_LIMIT: ${QUERY_RATE_LIMIT:-5/minute}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_SSL: "false"
      POSTGRES_URI: postgresql://personalrag:personalrag@postgres:5432/personalrag
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-true}
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chromadb:
    image: chromadb/chroma:1.0.15
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
    volumes:
      - chroma-data:/data
    expose:
      - "8000"
    healthcheck:
      test:
        ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: personalrag
      POSTGRES_USER: personalrag
      POSTGRES_PASSWORD: personalrag
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personalrag -d personalrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chroma-data:
  postgres-data:
